<body>

    <nav>
      <ul>

      <ul>

  <main>

<article>

  <h1>Stress Test</h1><p><em>June 11, 2025</em></p>
  <div>
    
        <article x-data="{rows:1000, columns:100, samples:1000}">
            <form>
                <fieldset>
                    <div class="parent">
                        <div class="div1">
                            <label for="columns">Columns:
                                <input id="columns" x-model.number="columns" type="number" min="1">
                            </label>

                        </div>
                        <div class="div2">

                            <label for="rows">Rows:</label>
                            <input id="rows" x-model.number="rows" type="number" min="1">
                            </label>

                        </div>
                        <div class="div3">
                            <label for="samples">Max Samples:
                                <input id="samples" x-model.number="samples" type="number" min="1">
                            </label>
                        </div>
                    </div>
                </fieldset>
            </form>
            <button x-data="{title: 'Start'}" @click="$store.engine.profile(rows, columns, samples); title='Restart';" x-text="title"></button>
        </article>

        <article>
            <h3>Performance Histogram</h3>
            <div id="chart_div"></div>
        </article>
<!--
        <div>
            <hr>
            <h3>Facet:</h3>
            <pre>
                <code id="prism-1" class="language-javascript"></code>
            </pre>
        </div>
-->
        
<!-- JS Content -->
<script src="/js/utils.js"></script>
<script src="/js/simple_alpine_table.js"></script>
<script src="/js/prism.js" data-manual></script>
<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

<script type="module">
import {Engine} from "/nosheet.esm.js"
    //
    //Plumb in Alpine
    //
    Alpine.store('engine', {

        timerId: 0,
        samples: [], //performance samples are stored here
        iteration: 0,
        profile(rows, columns, max_samples) {

            this.samples = [];
            clearInterval(this.timerId);

            let headers = ['seed'],
                t = Array.from({ length: rows }, _ => [Math.random()]),
                f = 1/3;

            let e = new Engine().def('i', () => this.iteration);
            for(let i = 0; i < columns; i++){
                e = e.def(`c${i}`, (r) => (r.seed + i) / f);
            }

            const ctx = e.bind(headers, t);

            this.timerId = window.setTimeout(
                (obj) => obj.calculate( _ => {
                        ctx.evaluate();
                        this.iteration++;
                    },
                    max_samples
                ),
                200,
                this
            );
        },

        calculate(callback, max_samples) {

            //this will force a recalculation
            let mark = window.performance.now();

            callback();

            this.samples.push([window.performance.now() - mark]);

            if (this.samples.length > max_samples) {

                this.samples.shift();
            }

            drawChart();

            this.timerId = window.setTimeout(
                (obj) => obj.calculate(callback, max_samples),
                200,
                this
            );
        }
    });

    //https://developers.google.com/chart/interactive/docs/gallery/histogram
    google.charts.load("current", { packages: ["corechart"] });
    google.charts.setOnLoadCallback(drawChart);

    var options = {
        legend: { position: 'none' },
        colors: ['#4285F4'],

        chartArea: { width: '90%' },
        hAxis: {
            viewWindowMode: 'pretty',
            title: 'execution time in ms',
            format: '#.#',
            slantedTextAngle: 75,
            textStyle: {
                fontSize: 12
            },
            titleTextStyle: {
                italic: false,
                fontSize: 14
            }
        },
        vAxis: {
            title: 'count',
            titleTextStyle: {
                italic: false,
                fontSize: 14
            }
        },
        bar: { gap: 0 },

        histogram: {
            bucketSize: 0.01,
            maxNumBuckets: 100,
            minValue: 0,
            maxValue: 1
        }
    };

    function drawChart() {
        /*        
        https://developers-dot-devsite-v2-prod.appspot.com/chart/interactive/docs/gallery/histogram_f074295fabe49e9cdca3f755b6d6058a2370c392cadbdfa48e4920592cd1e2e9.frame
        https://developers.google.com/chart/interactive/docs/gallery/histogram
        */

        var data = new google.visualization.DataTable();

        data.addColumn('number', 'Time(ms)');
        data.addRows(Alpine.store('engine')?.samples ?? []);

        var chart = new google.visualization.Histogram(document.getElementById('chart_div'));
        chart.draw(data, options);
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" crossorigin="anonymous"></script>
  </div>

</article>
</main>
